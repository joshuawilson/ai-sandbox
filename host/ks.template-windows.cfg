lang en_US
keyboard us
timezone UTC

# Without this, Anaconda may stop for license / hub screens even with the rest automated.
eula --agreed

rootpw --lock
# Hash from openssl passwd -6; --iscrypted is required or Anaconda stores the $6$... string as the literal password.
# UID must match the numeric owner of secrets/ on the host (SMB uid mapping).
user --name=ai --uid=__SANDBOX_OWNER_UID__ --groups=wheel --iscrypted --password=__PASSWORD_HASH__
sshkey --username=ai "__SSH_KEY__"

firewall --enabled
selinux --enforcing

# Storage: autopart alone triggers "Kickstart insufficient" on Installation Destination.
# Wipes the VM disk (expected for a fresh vhdx from create-vm-windows.ps1).
zerombr
clearpart --all --initlabel
autopart

%packages
@workstation-product-environment
git
curl
cifs-utils
terminator
%end

%post --log=/root/ks-post.log

# Unattended first boot with CIFS/SMB (Windows Hyper-V host).
echo 'ai ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/90-ai-sandbox
chmod 440 /etc/sudoers.d/90-ai-sandbox

mkdir -p /etc/ai-sandbox /usr/local/bin

# CIFS configuration: ensure-sandbox-mounts.sh reads this.
cat > /etc/ai-sandbox/cifs.env << 'CIFSEOF'
USE_CIFS=1
CIFS_URL=__CIFS_URL__
CIFS_GUEST=1
CIFSEOF

# SMB credentials (if using authenticated access instead of guest)
if [ -n "__SMB_USERNAME__" ]; then
cat > /etc/ai-sandbox/smbcredentials << 'CREDEOF'
username=__SMB_USERNAME__
password=__SMB_PASSWORD__
CREDEOF
chmod 600 /etc/ai-sandbox/smbcredentials
fi

# Mounts + ~/ai-sandbox symlinks after network is up (CIFS needs network).
cat > /usr/local/bin/ai-sandbox-cifs-setup.sh << 'EOF'
#!/bin/bash
set -euo pipefail

mkdir -p /mnt/host-config /mnt/host-secrets /mnt/host-workspace /mnt/host-ai-sandbox

# Source CIFS configuration
if [ ! -f /etc/ai-sandbox/cifs.env ]; then
  echo "ai-sandbox: Missing /etc/ai-sandbox/cifs.env" >&2
  exit 1
fi

set -a
source /etc/ai-sandbox/cifs.env
set +a

# Mount main SMB share first if not already mounted
if ! mountpoint -q /mnt/host-ai-sandbox 2>/dev/null; then
  echo "ai-sandbox: Mounting SMB share $CIFS_URL..." >&2

  # Wait for network
  timeout=60
  while [ $timeout -gt 0 ]; do
    if ping -c 1 -W 1 $(echo "$CIFS_URL" | cut -d/ -f3) >/dev/null 2>&1; then
      break
    fi
    sleep 1
    timeout=$((timeout - 1))
  done

  if [ $timeout -le 0 ]; then
    echo "ai-sandbox: Network/host not reachable" >&2
    exit 1
  fi

  uid=$(id -u ai)
  gid=$(id -g ai)

  # Check if using guest or authenticated access
  if [ "${CIFS_GUEST:-0}" = "1" ]; then
    # Guest access (requires AllowInsecureGuestAuth on Windows)
    mount_opts="guest,uid=$uid,gid=$gid,file_mode=0644,dir_mode=0755,noperm,vers=3.0"
  else
    # Authenticated access with credentials file
    if [ ! -f "${CIFS_CREDENTIALS:-}" ]; then
      echo "ai-sandbox: CIFS_CREDENTIALS not found: ${CIFS_CREDENTIALS}" >&2
      exit 1
    fi
    mount_opts="credentials=${CIFS_CREDENTIALS},uid=$uid,gid=$gid,file_mode=0644,dir_mode=0755,noperm,vers=3.0"
  fi

  if ! mount -t cifs "$CIFS_URL" /mnt/host-ai-sandbox -o "$mount_opts"; then
    echo "ai-sandbox: Failed to mount $CIFS_URL. Check:" >&2
    echo "  - SMB share exists: Get-SmbShare -Name ai-sandbox" >&2
    if [ "${CIFS_GUEST:-0}" = "1" ]; then
      echo "  - Guest access enabled: AllowInsecureGuestAuth registry setting" >&2
      echo "  - Share has Everyone read access" >&2
    else
      echo "  - Credentials file exists and is correct" >&2
    fi
    echo "  - Windows firewall allows SMB (port 445)" >&2
    echo "  - Network connectivity to host" >&2
    exit 1
  fi

  echo "ai-sandbox: SMB share mounted successfully" >&2
fi

# Now run ensure-sandbox-mounts.sh from the mounted share
if [ -x /mnt/host-ai-sandbox/config/ensure-sandbox-mounts.sh ]; then
  bash /mnt/host-ai-sandbox/config/ensure-sandbox-mounts.sh ai
else
  echo "ai-sandbox: Missing /mnt/host-ai-sandbox/config/ensure-sandbox-mounts.sh" >&2
  exit 1
fi

echo "ai-sandbox: CIFS shares and ~/ai-sandbox symlinks ready." >&2
EOF

chmod +x /usr/local/bin/ai-sandbox-cifs-setup.sh

cat > /usr/local/bin/ai-sandbox-recover-mounts.sh << 'EOF'
#!/bin/bash
set -euo pipefail
echo "ai-sandbox: recover — running CIFS setup (as root)..." >&2
exec /usr/local/bin/ai-sandbox-cifs-setup.sh
EOF

chmod +x /usr/local/bin/ai-sandbox-recover-mounts.sh

# Heavy install (dnf, Cursor) runs after mounts exist.
cat > /usr/local/bin/ai-sandbox-firstboot.sh << 'EOF'
#!/bin/bash
set -euo pipefail
MARKER=/var/lib/ai-sandbox-firstboot.done
[ -f "$MARKER" ] && exit 0

if [ ! -d /home/ai/ai-sandbox/config ]; then
  echo "ai-sandbox: /home/ai/ai-sandbox missing; CIFS setup failed or did not run. Try: sudo /usr/local/bin/ai-sandbox-recover-mounts.sh" >&2
  exit 1
fi

sudo -u ai bash /home/ai/ai-sandbox/config/install-inside-vm.sh

touch "$MARKER"
EOF

chmod +x /usr/local/bin/ai-sandbox-firstboot.sh

cat > /etc/systemd/system/ai-sandbox-cifs-mounts.service << 'EOF'
[Unit]
Description=AI Sandbox CIFS/SMB mounts + ~/ai-sandbox
After=network-online.target
Wants=network-online.target
DefaultDependencies=yes

[Service]
Type=oneshot
ExecStart=/usr/local/bin/ai-sandbox-cifs-setup.sh
RemainAfterExit=yes
TimeoutStartSec=180

[Install]
WantedBy=multi-user.target
EOF

cat > /etc/systemd/system/ai-sandbox-firstboot.service << 'EOF'
[Unit]
Description=AI Sandbox install-inside-vm (once; after CIFS mounts)
After=network-online.target ai-sandbox-cifs-mounts.service
Wants=network-online.target
Requires=ai-sandbox-cifs-mounts.service

[Service]
Type=oneshot
ExecStart=/usr/local/bin/ai-sandbox-firstboot.sh
RemainAfterExit=yes

[Install]
WantedBy=multi-user.target
EOF

systemctl enable ai-sandbox-cifs-mounts.service
systemctl enable ai-sandbox-firstboot.service

# Terminator autostart for user ai
mkdir -p /home/ai/.config/autostart
cat > /home/ai/.config/autostart/terminator.desktop << 'TERMEOF'
[Desktop Entry]
Type=Application
Name=Terminator
Exec=terminator
X-GNOME-Autostart-enabled=true
TERMEOF
chown -R ai:ai /home/ai/.config

%end
