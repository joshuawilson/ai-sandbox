lang en_US
keyboard us
timezone UTC

# Without this, Anaconda may stop for license / hub screens even with the rest automated.
eula --agreed

rootpw --lock
# Hash from openssl passwd -6; --iscrypted is required or Anaconda stores the $6$... string as the literal password.
user --name=ai --uid=__SANDBOX_OWNER_UID__ --groups=wheel --iscrypted --password=__PASSWORD_HASH__
sshkey --username=ai "__SSH_KEY__"

firewall --enabled
selinux --enforcing

# Storage: autopart alone triggers "Kickstart insufficient" on Installation Destination.
# Wipes the VM disk (expected for a fresh vhdx from create-vm-windows.ps1).
zerombr
clearpart --all --initlabel
autopart

%packages
@workstation-product-environment
git
curl
terminator
%end

%post --log=/root/ks-post.log

# Windows host setup: files delivered via HTTP instead of SMB/CIFS mounting
# This avoids all Windows Home SMB authentication complexity

echo 'ai ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/90-ai-sandbox
chmod 440 /etc/sudoers.d/90-ai-sandbox

mkdir -p /etc/ai-sandbox /usr/local/bin

# Store Windows host IP for HTTP downloads and skip mount requirement
cat > /etc/ai-sandbox/windows-host.env << 'HOSTEOF'
WINDOWS_HOST_IP=__WINDOWS_HOST_IP__
HTTP_PORT=8000
USE_HTTP=1
HOSTEOF

# HTTP file sync script - downloads files from Windows host
cat > /usr/local/bin/ai-sandbox-http-sync.sh << 'EOF'
#!/bin/bash
set -euo pipefail

if [ ! -f /etc/ai-sandbox/windows-host.env ]; then
  echo "ai-sandbox: Missing /etc/ai-sandbox/windows-host.env" >&2
  exit 1
fi

source /etc/ai-sandbox/windows-host.env

# Wait for network
timeout=60
while [ $timeout -gt 0 ]; do
  if ping -c 1 -W 1 $WINDOWS_HOST_IP >/dev/null 2>&1; then
    break
  fi
  sleep 1
  timeout=$((timeout - 1))
done

if [ $timeout -le 0 ]; then
  echo "ai-sandbox: Cannot reach Windows host at $WINDOWS_HOST_IP" >&2
  exit 1
fi

# Create directory structure
mkdir -p /home/ai/ai-sandbox/{config,secrets,workspace,logs}
chown -R ai:ai /home/ai/ai-sandbox

# Download essential config files
echo "ai-sandbox: Downloading config files from http://$WINDOWS_HOST_IP:$HTTP_PORT/" >&2

cd /home/ai/ai-sandbox/config
for file in install-inside-vm.sh start-day.sh start-dev.sh start-container.sh setup-claude.sh \
            ensure-sandbox-mounts.sh create-project.sh stop-container.sh build-container.sh \
            merge-claude-bootstrap.sh run-claude-setup-once.sh rebuild-container.sh \
            first-project-name.sh reset-project.sh snapshot-project.sh restore-project.sh; do
  if curl -f -s -o "$file" "http://$WINDOWS_HOST_IP:$HTTP_PORT/config/$file" 2>/dev/null; then
    # Convert Windows line endings (CRLF) to Unix (LF)
    sed -i 's/\r$//' "$file"
    chmod +x "$file"
  else
    echo "ai-sandbox: Warning - could not download config/$file" >&2
  fi
done

# Download lib directory
mkdir -p lib
cd lib
for file in claude-login-env.sh podman-workspace-volumes.sh podman-claude-devhome.sh \
            podman-vertex-container-opts.sh; do
  if curl -f -s -o "$file" "http://$WINDOWS_HOST_IP:$HTTP_PORT/config/lib/$file" 2>/dev/null; then
    # Convert Windows line endings to Unix
    sed -i 's/\r$//' "$file"
  fi
done
cd ..

# Download other essential config files (non-executable)
for file in Containerfile container.env claude-code.settings.json; do
  curl -f -s -o "$file" "http://$WINDOWS_HOST_IP:$HTTP_PORT/config/$file" 2>/dev/null || \
    echo "ai-sandbox: Warning - could not download config/$file" >&2
done

# Download claude-bootstrap directory
mkdir -p claude-bootstrap/skills
cd claude-bootstrap
for file in CLAUDE.md; do
  curl -f -s -o "$file" "http://$WINDOWS_HOST_IP:$HTTP_PORT/config/claude-bootstrap/$file" 2>/dev/null || true
done
cd skills
for file in commit.md review-pr.md; do
  curl -f -s -o "$file" "http://$WINDOWS_HOST_IP:$HTTP_PORT/config/claude-bootstrap/skills/$file" 2>/dev/null || true
done
cd ../..

# Copy SSH keys from host (if available via HTTP)
mkdir -p /home/ai/.ssh
chmod 700 /home/ai/.ssh
if curl -f -s -o /home/ai/.ssh/id_ed25519 "http://$WINDOWS_HOST_IP:$HTTP_PORT/secrets/ssh/id_ed25519" 2>/dev/null; then
  chmod 600 /home/ai/.ssh/id_ed25519
  curl -f -s -o /home/ai/.ssh/id_ed25519.pub "http://$WINDOWS_HOST_IP:$HTTP_PORT/secrets/ssh/id_ed25519.pub" 2>/dev/null || true
  chmod 644 /home/ai/.ssh/id_ed25519.pub
fi

chown -R ai:ai /home/ai/ai-sandbox /home/ai/.ssh

echo "ai-sandbox: HTTP sync complete" >&2
EOF

chmod +x /usr/local/bin/ai-sandbox-http-sync.sh

cat > /usr/local/bin/ai-sandbox-recover-mounts.sh << 'EOF'
#!/bin/bash
set -euo pipefail
echo "ai-sandbox: recover — running HTTP sync (as root)..." >&2
exec /usr/local/bin/ai-sandbox-http-sync.sh
EOF

chmod +x /usr/local/bin/ai-sandbox-recover-mounts.sh

# Firstboot script - runs after HTTP sync
cat > /usr/local/bin/ai-sandbox-firstboot.sh << 'EOF'
#!/bin/bash
set -euo pipefail
MARKER=/var/lib/ai-sandbox-firstboot.done
[ -f "$MARKER" ] && exit 0

if [ ! -d /home/ai/ai-sandbox/config ]; then
  echo "ai-sandbox: /home/ai/ai-sandbox/config missing; HTTP sync failed. Try: sudo /usr/local/bin/ai-sandbox-http-sync.sh" >&2
  exit 1
fi

if [ ! -x /home/ai/ai-sandbox/config/install-inside-vm.sh ]; then
  echo "ai-sandbox: install-inside-vm.sh missing or not executable" >&2
  exit 1
fi

sudo -u ai bash /home/ai/ai-sandbox/config/install-inside-vm.sh

touch "$MARKER"
EOF

chmod +x /usr/local/bin/ai-sandbox-firstboot.sh

# Systemd services
cat > /etc/systemd/system/ai-sandbox-http-sync.service << 'EOF'
[Unit]
Description=AI Sandbox HTTP file sync from Windows host
After=network-online.target
Wants=network-online.target
DefaultDependencies=yes

[Service]
Type=oneshot
ExecStart=/usr/local/bin/ai-sandbox-http-sync.sh
RemainAfterExit=yes
TimeoutStartSec=180

[Install]
WantedBy=multi-user.target
EOF

cat > /etc/systemd/system/ai-sandbox-firstboot.service << 'EOF'
[Unit]
Description=AI Sandbox install-inside-vm (once; after HTTP sync)
After=network-online.target ai-sandbox-http-sync.service
Wants=network-online.target
Requires=ai-sandbox-http-sync.service

[Service]
Type=oneshot
ExecStart=/usr/local/bin/ai-sandbox-firstboot.sh
RemainAfterExit=yes

[Install]
WantedBy=multi-user.target
EOF

systemctl enable ai-sandbox-http-sync.service
systemctl enable ai-sandbox-firstboot.service

# Terminator autostart for user ai
mkdir -p /home/ai/.config/autostart
cat > /home/ai/.config/autostart/terminator.desktop << 'TERMEOF'
[Desktop Entry]
Type=Application
Name=Terminator
Exec=terminator
X-GNOME-Autostart-enabled=true
TERMEOF
chown -R ai:ai /home/ai/.config

%end
