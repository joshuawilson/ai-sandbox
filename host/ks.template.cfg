lang en_US
keyboard us
timezone UTC

# Without this, Anaconda may stop for license / hub screens even with the rest automated.
eula --agreed

rootpw --lock
# Hash from openssl passwd -6; --iscrypted is required or Anaconda stores the $6$... string as the literal password.
# UID must match the numeric owner of secrets/ on the host (virtiofs passthrough + chmod 700 on secrets/).
user --name=ai --uid=__SANDBOX_OWNER_UID__ --groups=wheel --iscrypted --password=__PASSWORD_HASH__
sshkey --username=ai "__SSH_KEY__"

firewall --enabled
selinux --enforcing

# Storage: autopart alone triggers "Kickstart insufficient" on Installation Destination.
# Wipes the VM disk (expected for a fresh qcow2 from create-vm-linux.sh).
zerombr
clearpart --all --initlabel
autopart

%packages
@workstation-product-environment
git
curl
terminator
%end

%post --log=/root/ks-post.log

# Unattended first boot: virtiofs is unreliable inside Anaconda %post; run setup after reboot.
echo 'ai ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/90-ai-sandbox
chmod 440 /etc/sudoers.d/90-ai-sandbox

# Load virtiofs (module name on Fedora is virtiofs, not virtio_fs) before fstab mounts.
mkdir -p /etc/modules-load.d
echo 'virtiofs' > /etc/modules-load.d/ai-sandbox-virtiofs.conf

mkdir -p /usr/local/bin

# Mounts + ~/ai-sandbox symlinks must NOT wait for network-online (user can log in to GNOME first).
cat > /usr/local/bin/ai-sandbox-virtiofs-setup.sh << 'EOF'
#!/bin/bash
set -euo pipefail
modprobe virtiofs 2>/dev/null || true

mkdir -p /mnt/host-config /mnt/host-secrets /mnt/host-workspace

if ! mountpoint -q /mnt/host-config 2>/dev/null; then
  if ! timeout 90 mount -t virtiofs host-config /mnt/host-config; then
    echo "ai-sandbox: mount -t virtiofs host-config failed (see kernel message above)." >&2
    echo "ai-sandbox: If tag missing, confirm host used host/create-vm-linux.sh virtiofs. Else see config/cifs.env.example." >&2
    exit 1
  fi
fi

if [ ! -x /mnt/host-config/ensure-sandbox-mounts.sh ]; then
  echo "ai-sandbox: host-config share missing ensure-sandbox-mounts.sh" >&2
  exit 1
fi

bash /mnt/host-config/ensure-sandbox-mounts.sh ai
echo "ai-sandbox: virtiofs and ~/ai-sandbox symlinks ready." >&2
EOF

chmod +x /usr/local/bin/ai-sandbox-virtiofs-setup.sh

cat > /usr/local/bin/ai-sandbox-recover-mounts.sh << 'EOF'
#!/bin/bash
set -euo pipefail
echo "ai-sandbox: recover — running virtiofs setup (as root)..." >&2
exec /usr/local/bin/ai-sandbox-virtiofs-setup.sh
EOF

chmod +x /usr/local/bin/ai-sandbox-recover-mounts.sh

# Heavy install (dnf, Cursor) still runs after network; mounts already exist for user ai.
cat > /usr/local/bin/ai-sandbox-firstboot.sh << 'EOF'
#!/bin/bash
set -euo pipefail
MARKER=/var/lib/ai-sandbox-firstboot.done
[ -f "$MARKER" ] && exit 0

if [ ! -d /home/ai/ai-sandbox/config ]; then
  echo "ai-sandbox: /home/ai/ai-sandbox missing; virtiofs setup failed or did not run. Try: sudo /usr/local/bin/ai-sandbox-recover-mounts.sh" >&2
  exit 1
fi

sudo -u ai bash /home/ai/ai-sandbox/config/install-inside-vm.sh

touch "$MARKER"
EOF

chmod +x /usr/local/bin/ai-sandbox-firstboot.sh

cat > /etc/systemd/system/ai-sandbox-virtiofs-mounts.service << 'EOF'
[Unit]
Description=AI Sandbox virtiofs mounts + ~/ai-sandbox
After=local-fs.target systemd-modules-load.service systemd-udevd.service
# Do NOT use Before=display-manager.service: if mount or ensure-sandbox-mounts hangs, GDM never
# starts and the console stays black until power-off. Mounts still start early via WantedBy=multi-user.
DefaultDependencies=yes

[Service]
Type=oneshot
ExecStart=/usr/local/bin/ai-sandbox-virtiofs-setup.sh
RemainAfterExit=yes
TimeoutStartSec=120

[Install]
WantedBy=multi-user.target
EOF

cat > /etc/systemd/system/ai-sandbox-firstboot.service << 'EOF'
[Unit]
Description=AI Sandbox install-inside-vm (once; after network)
After=network-online.target ai-sandbox-virtiofs-mounts.service
Wants=network-online.target

[Service]
Type=oneshot
ExecStart=/usr/local/bin/ai-sandbox-firstboot.sh
RemainAfterExit=yes

[Install]
WantedBy=multi-user.target
EOF

systemctl enable ai-sandbox-virtiofs-mounts.service
systemctl enable ai-sandbox-firstboot.service

# Terminator autostart for user ai
mkdir -p /home/ai/.config/autostart
cat > /home/ai/.config/autostart/terminator.desktop << 'TERMEOF'
[Desktop Entry]
Type=Application
Name=Terminator
Exec=terminator
X-GNOME-Autostart-enabled=true
TERMEOF
chown -R ai:ai /home/ai/.config

%end
